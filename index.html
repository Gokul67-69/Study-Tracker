<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARS ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060608;
  --s1:#0e0e14;
  --s2:#14141e;
  --s3:#1c1c2a;
  --border:#222230;
  --border2:#2e2e44;
  --text:#ebebf5;
  --muted:#6a6a88;
  --muted2:#9898b8;
  --accent:#7c6dfa;
  --accent-glow:rgba(124,109,250,0.18);
  --green:#22d9a0;
  --green-glow:rgba(34,217,160,0.15);
  --amber:#f5a623;
  --red:#f55f57;
  --radius:14px;
  --font:'Outfit',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(124,109,250,0.07),transparent);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:1360px;margin:0 auto;padding:28px 24px;}

/* ===== HEADER ===== */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s1);border:1px solid var(--border);
  border-radius:18px;padding:1.6rem 2rem;margin-bottom:1.5rem;
  position:relative;overflow:hidden;
}
.hdr::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.hdr-left{}
.hdr-name{
  font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.hdr-name .editable-name{
  cursor:pointer;border-bottom:1px dashed var(--border2);
  padding-bottom:1px;transition:border-color 0.2s;
}
.hdr-name .editable-name:hover{border-color:var(--accent);}
.hdr-sub{font-size:0.82rem;color:var(--muted2);margin-top:0.3rem;display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center;}
.badge{
  background:rgba(124,109,250,0.12);border:1px solid rgba(124,109,250,0.25);
  color:var(--accent);padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;
}
.badge.g{background:rgba(34,217,160,0.1);border-color:rgba(34,217,160,0.25);color:var(--green);}
.badge.a{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.25);color:var(--amber);}
.notif-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;
  background:rgba(245,95,87,0.1);border:1px solid rgba(245,95,87,0.3);color:var(--red);
  transition:all 0.15s;
}
.notif-badge.granted{background:rgba(34,217,160,0.1);border-color:rgba(34,217,160,0.3);color:var(--green);}
.notif-badge:hover{filter:brightness(1.15);}
.hdr-right{display:flex;gap:0.7rem;flex-wrap:wrap;}
.icon-btn{
  background:var(--s2);border:1px solid var(--border2);border-radius:10px;
  padding:0.55rem 1rem;font-size:0.78rem;font-weight:600;
  color:var(--muted2);cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;gap:0.4rem;transition:all 0.15s;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* ===== KPI ROW ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.kpi{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem 1.4rem;
  position:relative;overflow:hidden;transition:transform 0.2s;
}
.kpi:hover{transform:translateY(-2px);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--accent));}
.kpi-l{font-size:0.68rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:0.5rem;}
.kpi-v{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--kc,var(--accent));line-height:1;}
.kpi-s{font-size:0.72rem;color:var(--muted);margin-top:0.3rem;}

/* ===== LAYOUT ===== */
.layout{display:grid;grid-template-columns:1fr 360px;gap:1.2rem;margin-bottom:1.5rem;}

/* ===== CARD ===== */
.card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:1.8rem;}
.card-title{font-size:0.95rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:1.4rem;display:flex;align-items:center;gap:0.5rem;}

/* ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1.4rem;}
.ring-svg{transform:rotate(-90deg);}
.r-bg{fill:none;stroke:var(--border2);stroke-width:7;}
.r-fill{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;stroke-dasharray:534;stroke-dashoffset:534;transition:stroke-dashoffset 1s linear,stroke 0.4s;}
.r-fill.brk{stroke:var(--green);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pos{position:relative;width:176px;height:176px;}
.t-num{font-family:var(--mono);font-size:2.6rem;font-weight:700;line-height:1;color:var(--text);}
.t-phase{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.phase-dots{display:flex;gap:6px;margin-top:14px;}
.pd{width:30px;height:5px;border-radius:3px;background:var(--border2);transition:background 0.3s;}
.pd.w.on{background:var(--accent);}
.pd.b.on{background:var(--green);}
.pd.done{background:var(--border2);opacity:0.35;}

/* selectors */
.sel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-bottom:1rem;}
.sel{
  padding:0.6rem 0.8rem;background:var(--s2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:0.8rem;font-family:var(--font);
  outline:none;cursor:pointer;transition:border-color 0.2s;
}
.sel:focus{border-color:var(--accent);}
.sel option{background:var(--s2);}

/* btns */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;}
.btn{
  padding:0.75rem 1rem;border:none;border-radius:9px;
  font-size:0.82rem;font-weight:700;cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:0.4rem;
  transition:all 0.15s;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.btn-start{background:var(--accent);color:#fff;grid-column:1/-1;}
.btn-pause{background:rgba(245,95,87,0.15);border:1px solid rgba(245,95,87,0.3);color:var(--red);}
.btn-reset{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);}
.btn-pip{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);}
.btn-pip.active{background:rgba(124,109,250,0.15);border-color:var(--accent);color:var(--accent);}

/* ===== LOG ===== */
.log-scroll{overflow-y:auto;max-height:390px;padding-right:4px;}
.log-scroll::-webkit-scrollbar{width:3px;}
.log-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.log-item{
  display:grid;grid-template-columns:8px 1fr auto;
  align-items:start;gap:0.7rem;
  padding:0.8rem 0;border-bottom:1px solid var(--border);
}
.log-item:last-child{border-bottom:none;}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.log-sub{font-size:0.8rem;font-weight:600;color:var(--text);}
.log-ch{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.log-dt{font-size:0.68rem;color:var(--muted);margin-top:3px;}
.log-dur{font-family:var(--mono);font-size:0.72rem;color:var(--muted2);white-space:nowrap;}
.log-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.82rem;}
.log-empty .em{font-size:2rem;margin-bottom:0.4rem;}

/* ===== SUBJECTS SECTION ===== */
.exams-wrap{}
.exam-block{margin-bottom:2rem;}
.exam-header{
  display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;
  padding:0.6rem 1rem;background:var(--s1);border:1px solid var(--border);
  border-radius:10px;
}
.exam-label-text{font-size:0.8rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.exam-actions{display:flex;gap:0.5rem;margin-left:auto;}
.tiny-btn{
  padding:3px 9px;border-radius:6px;font-size:0.7rem;font-weight:600;
  cursor:pointer;font-family:var(--font);border:1px solid var(--border2);
  background:var(--s2);color:var(--muted2);transition:all 0.15s;
}
.tiny-btn:hover{border-color:var(--accent);color:var(--accent);}
.tiny-btn.del:hover{border-color:var(--red);color:var(--red);}
.exam-progress-text{font-size:0.72rem;color:var(--muted);margin-left:auto;font-family:var(--mono);}

.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;}

.subj-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;
  transition:border-color 0.2s,transform 0.2s;
}
.subj-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.subj-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem;gap:0.4rem;}
.subj-name{font-size:0.88rem;font-weight:700;line-height:1.3;flex:1;cursor:pointer;}
.subj-name:hover{color:var(--accent);}
.subj-pct{font-family:var(--mono);font-size:1.3rem;font-weight:700;flex-shrink:0;}
.prog{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:0.5rem;}
.prog-f{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
.subj-meta{font-size:0.7rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.subj-acts{display:flex;gap:0.3rem;margin-top:0.7rem;}

.chap-panel{display:none;margin-top:0.9rem;padding-top:0.9rem;border-top:1px solid var(--border);}
.subj-card.open .chap-panel{display:block;}
.chap-item{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.45rem 0.3rem;cursor:pointer;border-radius:6px;
  transition:background 0.1s;
}
.chap-item:hover{background:rgba(255,255,255,0.025);}
.chk{
  width:17px;height:17px;border:1.5px solid var(--border2);border-radius:4px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:0.6rem;color:transparent;transition:all 0.15s;
}
.chap-item.done .chk{background:var(--green);border-color:var(--green);color:#fff;}
.chap-item.done .chap-name{color:var(--muted);text-decoration:line-through;}
.chap-name{font-size:0.78rem;color:var(--muted2);flex:1;transition:color 0.15s;}
.chap-del{
  opacity:0;font-size:0.65rem;color:var(--red);background:none;border:none;
  cursor:pointer;padding:2px 4px;transition:opacity 0.15s;
}
.chap-item:hover .chap-del{opacity:1;}
.add-chap-row{margin-top:0.6rem;display:flex;gap:0.4rem;}
.mini-input{
  flex:1;padding:0.45rem 0.6rem;background:var(--s2);border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:0.75rem;font-family:var(--font);outline:none;
}
.mini-input:focus{border-color:var(--accent);}
.mini-add{
  padding:0.45rem 0.8rem;background:var(--accent);border:none;border-radius:7px;
  color:#fff;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:var(--font);
  transition:filter 0.15s;
}
.mini-add:hover{filter:brightness(1.1);}
.add-subj-btn{
  display:flex;align-items:center;justify-content:center;gap:0.4rem;
  border:1.5px dashed var(--border2);border-radius:var(--radius);
  padding:1.4rem;color:var(--muted);font-size:0.8rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;background:transparent;width:100%;font-family:var(--font);
}
.add-subj-btn:hover{border-color:var(--accent);color:var(--accent);}
.add-exam-btn{
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  border:1.5px dashed var(--border2);border-radius:12px;
  padding:1rem 1.5rem;color:var(--muted);font-size:0.82rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;background:transparent;width:100%;font-family:var(--font);
  margin-top:0.5rem;
}
.add-exam-btn:hover{border-color:var(--green);color:var(--green);}

/* ===== MODAL ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--s1);border:1px solid var(--border2);border-radius:18px;
  padding:2rem;min-width:340px;max-width:420px;width:90%;
  transform:scale(0.95);transition:transform 0.2s;
}
.overlay.show .modal{transform:scale(1);}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:1.2rem;}
.modal-input{
  width:100%;padding:0.75rem 1rem;background:var(--s2);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-size:0.9rem;font-family:var(--font);
  outline:none;margin-bottom:1rem;
}
.modal-input:focus{border-color:var(--accent);}
.modal-row{display:flex;gap:0.7rem;}
.modal-btn{
  flex:1;padding:0.75rem;border:none;border-radius:9px;font-size:0.85rem;
  font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.15s;
}
.modal-btn.confirm{background:var(--accent);color:#fff;}
.modal-btn.cancel{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);}
.color-picker{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.color-swatch{
  width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;
}
.color-swatch.sel{border-color:#fff;transform:scale(1.2);}
.color-label{font-size:0.72rem;color:var(--muted);margin-bottom:0.5rem;}

/* ===== PiP (inline fallback) ===== */
.pip{
  position:fixed;top:16px;right:16px;z-index:9999;
  width:230px;background:var(--s1);border:2px solid var(--accent);
  border-radius:16px;padding:1.2rem;box-shadow:0 20px 60px rgba(0,0,0,0.6);
  display:none;flex-direction:column;align-items:center;gap:0.6rem;
}
.pip.show{display:flex;}
.pip-x{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;}
.pip-time{font-family:var(--mono);font-size:2.4rem;font-weight:700;color:var(--accent);}
.pip-phase{font-size:0.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
.pip-sub{font-size:0.72rem;color:var(--muted);text-align:center;}
.pip-p{
  width:100%;padding:0.5rem;background:rgba(245,95,87,0.12);border:1px solid rgba(245,95,87,0.25);
  border-radius:7px;color:var(--red);font-size:0.75rem;font-weight:700;cursor:pointer;font-family:var(--font);
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--s2);border:1px solid var(--border2);border-radius:12px;
  padding:0.9rem 1.2rem;font-size:0.82rem;box-shadow:0 20px 40px rgba(0,0,0,0.5);
  transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index:99999;max-width:300px;
}
.toast.on{transform:translateY(0);opacity:1;}
.toast-t{font-weight:700;color:var(--green);margin-bottom:2px;font-size:0.85rem;}
.toast-b{color:var(--muted2);}

/* ===== TODO ===== */
.todo-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:1.6rem;margin-bottom:1.5rem;}
.todo-input-row{display:flex;gap:0.6rem;margin-bottom:1rem;}
.todo-inp{
  flex:1;padding:0.65rem 0.9rem;background:var(--s2);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-size:0.82rem;font-family:var(--font);outline:none;
}
.todo-inp:focus{border-color:var(--accent);}
.todo-inp::placeholder{color:var(--muted);}
.todo-add{
  padding:0.65rem 1.1rem;background:var(--accent);border:none;border-radius:9px;
  color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:var(--font);
  transition:filter 0.15s;white-space:nowrap;
}
.todo-add:hover{filter:brightness(1.1);}
.todo-list{display:flex;flex-direction:column;gap:0.35rem;max-height:260px;overflow-y:auto;padding-right:4px;}
.todo-list::-webkit-scrollbar{width:3px;}
.todo-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.todo-item{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.55rem 0.7rem;border-radius:8px;
  background:var(--s2);border:1px solid var(--border);
  transition:border-color 0.15s;
}
.todo-item:hover{border-color:var(--border2);}
.todo-item.done-t{opacity:0.45;}
.todo-chk{
  width:18px;height:18px;border:1.5px solid var(--border2);border-radius:5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;font-size:0.6rem;color:transparent;transition:all 0.15s;
}
.todo-item.done-t .todo-chk{background:var(--green);border-color:var(--green);color:#fff;}
.todo-item.done-t .todo-txt{text-decoration:line-through;color:var(--muted);}
.todo-txt{flex:1;font-size:0.82rem;color:var(--muted2);cursor:pointer;word-break:break-word;}
.todo-del{background:none;border:none;color:var(--muted);font-size:0.8rem;cursor:pointer;opacity:0;padding:2px 4px;transition:opacity 0.15s,color 0.15s;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:var(--red);}
.todo-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem;font-size:0.72rem;color:var(--muted);}
.todo-clear{background:none;border:none;color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:var(--font);}
.todo-clear:hover{color:var(--red);}
.todo-empty{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem;}

/* ===== DOC-PIP WINDOW STYLES (injected into pip window) ===== */
#docPipContent{
  font-family:'Outfit',sans-serif;
  background:#0e0e14;color:#ebebf5;
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0.5rem;padding:1.2rem;
  border:2px solid #7c6dfa;border-radius:14px;
  box-sizing:border-box;
}
#docPipContent .pip-time{
  font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;
  color:#7c6dfa;line-height:1;
}
#docPipContent .pip-time.brk{color:#22d9a0;}
#docPipContent .pip-phase{font-size:0.65rem;color:#9898b8;text-transform:uppercase;letter-spacing:1px;}
#docPipContent .pip-sub{font-size:0.72rem;color:#6a6a88;text-align:center;max-width:180px;}
#docPipContent .pip-p{
  width:100%;padding:0.5rem;background:rgba(245,95,87,0.12);border:1px solid rgba(245,95,87,0.25);
  border-radius:7px;color:#f55f57;font-size:0.75rem;font-weight:700;cursor:pointer;
  font-family:inherit;margin-top:0.3rem;
}
#docPipContent .pip-label{font-size:0.6rem;color:#6a6a88;letter-spacing:0.5px;margin-bottom:-0.3rem;}

/* responsive */
@media(max-width:1050px){.layout{grid-template-columns:1fr;}.kpi-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px){
  .wrap{padding:16px;}
  .hdr{flex-direction:column;align-items:flex-start;gap:0.8rem;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .sel-grid{grid-template-columns:1fr;}
  .btn-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-name">
        📚 <span class="editable-name" id="userName" onclick="editName()" title="Click to edit name">S.M. Gokul Krishna</span>
      </div>
      <div class="hdr-sub" id="hdrBadges"></div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" onclick="openModal('exam')">＋ Add Exam</button>
      <button class="icon-btn danger" onclick="clearAll()">🗑 Reset All</button>
    </div>
  </header>

  <!-- KPI -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- POMODORO + LOG -->
  <div class="layout">
    <div class="card">
      <div class="card-title">⏱ Pomodoro Timer <span style="font-size:0.7rem;color:var(--muted);font-weight:400;margin-left:4px;">50-10-50-10-50-20</span></div>
      <div class="ring-wrap">
        <div class="ring-pos">
          <svg class="ring-svg" width="176" height="176" viewBox="0 0 176 176">
            <circle class="r-bg" cx="88" cy="88" r="85"/>
            <circle class="r-fill" id="ringF" cx="88" cy="88" r="85"/>
          </svg>
          <div class="ring-center">
            <div class="t-num" id="tNum">50:00</div>
            <div class="t-phase" id="tPhase">Ready</div>
          </div>
        </div>
        <div class="phase-dots">
          <div class="pd w" id="pd0"></div>
          <div class="pd b" id="pd1"></div>
          <div class="pd w" id="pd2"></div>
          <div class="pd b" id="pd3"></div>
          <div class="pd w" id="pd4"></div>
          <div class="pd b" id="pd5"></div>
        </div>
      </div>
      <div class="sel-grid">
        <select class="sel" id="seExam" onchange="onExamChange()"><option value="">— Exam —</option></select>
        <select class="sel" id="seSub" onchange="onSubChange()"><option value="">— Subject —</option></select>
        <select class="sel" id="seCh"><option value="">— Chapter —</option></select>
      </div>
      <div class="btn-row">
        <button class="btn btn-start" id="startBtn" onclick="startTimer()">▶ Start</button>
        <button class="btn btn-pause" onclick="pauseTimer()">⏸ Pause</button>
        <button class="btn btn-reset" onclick="resetTimer()">↺ Reset</button>
        <button class="btn btn-pip" id="pipBtn" onclick="togglePip()">🖼 PiP</button>
      </div>
    </div>

    <div class="card" style="display:flex;flex-direction:column;">
      <div class="card-title">📋 Recent Sessions</div>
      <div class="log-scroll" id="logList">
        <div class="log-empty"><div class="em">🎯</div>No sessions yet — start studying!</div>
      </div>
    </div>
  </div>

  <!-- TODO -->
  <div class="todo-card">
    <div class="card-title">✅ To-Do List</div>
    <div class="todo-input-row">
      <input class="todo-inp" id="todoInp" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="todo-add" onclick="addTodo()">＋ Add</button>
    </div>
    <div class="todo-list" id="todoList"></div>
    <div class="todo-footer">
      <span id="todoCount">0 tasks</span>
      <button class="todo-clear" onclick="clearDoneTodos()">Clear completed</button>
    </div>
  </div>

  <!-- SUBJECTS -->
  <div class="exams-wrap" id="examsWrap"></div>
  <button class="add-exam-btn" onclick="openModal('exam')">＋ Add New Exam / Subject Group</button>

</div>

<!-- PiP (inline fallback when Document PiP not supported) -->
<div class="pip" id="pipEl">
  <button class="pip-x" onclick="togglePip()">✕</button>
  <div class="pip-time" id="pipT">50:00</div>
  <div class="pip-phase" id="pipPh">Work</div>
  <div class="pip-sub" id="pipSub">—</div>
  <button class="pip-p" onclick="pauseTimer()">⏸ Pause</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"><div class="toast-t" id="toastT"></div><div class="toast-b" id="toastB"></div></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle">Add</div>
    <div id="modalBody"></div>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" id="modalConfirm">Add</button>
    </div>
  </div>
</div>

<script>
// ==================== COLORS ====================
const PALETTE = ['#7c6dfa','#22d9a0','#f5a623','#f55f57','#38bdf8','#e879f9','#fb923c','#a3e635'];

// ==================== DEFAULT DATA ====================
const DEFAULT_DATA = { userName: 'Your Name', targetYear: '2027', exams: [] };

// ==================== STATE ====================
let state = loadState();
let sessions = loadSessions();
let completions = loadCompletions();

// pomodoro
const PHASES=[
  [50*60,'Work #1','w'],[10*60,'Break','b'],
  [50*60,'Work #2','w'],[10*60,'Break','b'],
  [50*60,'Work #3','w'],[20*60,'Long Break','b']
];
const CIRC = 2*Math.PI*85;
let tId=null,tRunning=false,phIdx=0,tVal=PHASES[0][0],tTotal=PHASES[0][0];
let selExamId='',selSubId='',selChapName='';

// PiP state
let docPipWindow = null;   // Document PiP window object
let pipInline = false;     // inline pip toggle (fallback)
const HAS_DOC_PIP = 'documentPictureInPicture' in window;

// modal state
let modalMode='',modalData={};
let selColor=PALETTE[0];

// ==================== NOTIFICATIONS ====================
let notifGranted = Notification.permission === 'granted';

async function requestNotifPermission(){
  if(Notification.permission === 'granted'){ notifGranted=true; renderHeader(); return; }
  if(Notification.permission === 'denied'){ toast('🔔 Blocked','Enable notifications in Chrome site settings'); return; }
  const perm = await Notification.requestPermission();
  notifGranted = perm === 'granted';
  renderHeader();
  if(notifGranted) toast('🔔 Notifications on','You will be alerted when each phase ends');
  else toast('🔔 Blocked','You can enable later in Chrome site settings');
}

function sendNotif(title, body, icon='📚'){
  if(!notifGranted) return;
  try{
    const n = new Notification(title, {
      body,
      icon: `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${icon}</text></svg>`,
      badge: `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>`,
      tag: 'study-tracker',
      renotify: true,
      requireInteraction: false,
      silent: false
    });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(()=>n.close(), 8000);
  } catch(e){ console.warn('Notification failed:',e); }
}

// ==================== STORAGE ====================
function loadState(){ try{return JSON.parse(localStorage.getItem('gk4_state'))||structuredClone(DEFAULT_DATA);}catch(e){return structuredClone(DEFAULT_DATA);} }
function saveState(){ localStorage.setItem('gk4_state',JSON.stringify(state)); }
function loadSessions(){ try{return JSON.parse(localStorage.getItem('gk4_sessions'))||[];}catch(e){return[];} }
function saveSessions(){ localStorage.setItem('gk4_sessions',JSON.stringify(sessions)); }
function loadCompletions(){ try{return JSON.parse(localStorage.getItem('gk4_comp'))||{};}catch(e){return{};} }
function saveCompletions(){ localStorage.setItem('gk4_comp',JSON.stringify(completions)); }
function genId(){ return 'i'+Math.random().toString(36).slice(2,9); }

// ==================== RENDER ====================
function render(){
  renderHeader();
  renderKPI();
  renderDropdowns();
  renderExams();
  renderLog();
}

function renderHeader(){
  document.getElementById('userName').textContent = state.userName;
  const badges = document.getElementById('hdrBadges');
  let html = '';
  state.exams.forEach(e=>{
    html += `<span class="badge" style="background:${e.color}22;border-color:${e.color}44;color:${e.color}">${e.name}</span> `;
  });
  html += `<span class="badge a">${state.targetYear||'May 2027'}</span>`;

  // Notification badge
  const notifState = Notification.permission;
  if(notifState === 'granted'){
    html += `<span class="notif-badge granted" onclick="toast('🔔 Active','Desktop notifications are enabled')">🔔 Notifs ON</span>`;
  } else if(notifState === 'denied'){
    html += `<span class="notif-badge" onclick="toast('🔕 Blocked','Go to Chrome → Site Settings → Notifications to allow')">🔕 Notifs Blocked</span>`;
  } else {
    html += `<span class="notif-badge" onclick="requestNotifPermission()">🔔 Enable Notifs</span>`;
  }

  badges.innerHTML = html;
}

function renderKPI(){
  const row = document.getElementById('kpiRow');
  let kpis=[];
  state.exams.slice(0,2).forEach(ex=>{
    let tot=0,done=0;
    ex.subjects.forEach(s=>{ s.chapters.forEach(c=>{ tot++; if(completions[`${ex.id}|${s.id}|${c}`]) done++; }); });
    const pct=tot?Math.round(done/tot*100):0;
    kpis.push({label:ex.name, val:pct+'%', sub:`${done}/${tot} chapters`, color:ex.color});
  });
  const today=new Date().toLocaleDateString('en-IN');
  const ts=sessions.filter(s=>s.date===today&&s.pt==='w');
  const tm=ts.reduce((a,s)=>a+parseInt(s.dur||0),0);
  kpis.push({label:"Today's Study", val:tm>=60?(tm/60).toFixed(1)+'h':tm+'m', sub:`${ts.length} sessions`, color:'#f5a623'});
  const ws=sessions.filter(s=>s.pt==='w');
  const wm=ws.reduce((a,s)=>a+parseInt(s.dur||0),0);
  kpis.push({label:'Total Sessions', val:ws.length, sub:`${Math.round(wm/60)}h total`, color:'#f55f57'});
  row.innerHTML = kpis.map(k=>`
    <div class="kpi" style="--kc:${k.color}">
      <div class="kpi-l">${k.label}</div>
      <div class="kpi-v">${k.val}</div>
      <div class="kpi-s">${k.sub}</div>
    </div>`).join('');
}

function renderDropdowns(){
  const eSel=document.getElementById('seExam');
  const cur=eSel.value;
  eSel.innerHTML='<option value="">— Exam —</option>';
  state.exams.forEach(ex=>{
    const o=document.createElement('option');
    o.value=ex.id; o.textContent=ex.name;
    if(ex.id===cur) o.selected=true;
    eSel.appendChild(o);
  });
  if(selExamId) onExamChange(true);
}

function onExamChange(keep=false){
  if(!keep) selExamId=document.getElementById('seExam').value;
  const sSel=document.getElementById('seSub');
  sSel.innerHTML='<option value="">— Subject —</option>';
  document.getElementById('seCh').innerHTML='<option value="">— Chapter —</option>';
  const ex=state.exams.find(e=>e.id===selExamId);
  if(!ex) return;
  ex.subjects.forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id; o.textContent=s.name;
    if(s.id===selSubId) o.selected=true;
    sSel.appendChild(o);
  });
  if(selSubId) onSubChange(true);
}

function onSubChange(keep=false){
  if(!keep) selSubId=document.getElementById('seSub').value;
  const cSel=document.getElementById('seCh');
  cSel.innerHTML='<option value="">— Chapter —</option>';
  const ex=state.exams.find(e=>e.id===selExamId);
  if(!ex) return;
  const sub=ex.subjects.find(s=>s.id===selSubId);
  if(!sub) return;
  sub.chapters.forEach(c=>{
    const o=document.createElement('option');
    o.value=c; o.textContent=c;
    if(c===selChapName) o.selected=true;
    cSel.appendChild(o);
  });
}

function renderExams(){
  const wrap=document.getElementById('examsWrap');
  wrap.innerHTML='';
  if(!state.exams.length){
    wrap.innerHTML=`<div style="text-align:center;padding:4rem 2rem;color:var(--muted);border:1.5px dashed var(--border2);border-radius:18px;margin-bottom:1rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">📭</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--muted2);margin-bottom:0.5rem;">No exams yet</div>
      <div style="font-size:0.85rem;margin-bottom:1.5rem;">Click <strong style="color:var(--accent)">＋ Add Exam</strong> in the header to get started</div>
    </div>`;
    return;
  }
  state.exams.forEach(ex=>{
    let tot=0,done=0;
    ex.subjects.forEach(s=>{ s.chapters.forEach(c=>{ tot++; if(completions[`${ex.id}|${s.id}|${c}`]) done++; }); });
    const pct=tot?Math.round(done/tot*100):0;

    const block=document.createElement('div');
    block.className='exam-block';
    block.innerHTML=`
      <div class="exam-header">
        <span class="exam-label-text" style="color:${ex.color}">${ex.name}</span>
        <div class="exam-progress-text">${done}/${tot} · ${pct}%</div>
        <div class="exam-actions">
          <button class="tiny-btn" onclick="openModal('exam-rename','${ex.id}')">✏️ Rename</button>
          <button class="tiny-btn" onclick="openModal('subject','${ex.id}')">＋ Subject</button>
          <button class="tiny-btn del" onclick="deleteExam('${ex.id}')">✕</button>
        </div>
      </div>
      <div class="subjects-grid" id="sg_${ex.id}"></div>
    `;
    wrap.appendChild(block);

    const grid=document.getElementById(`sg_${ex.id}`);
    ex.subjects.forEach(sub=>{
      const chs=sub.chapters;
      const sdone=chs.filter(c=>completions[`${ex.id}|${sub.id}|${c}`]).length;
      const spct=chs.length?Math.round(sdone/chs.length*100):0;

      const card=document.createElement('div');
      card.className='subj-card';
      card.id=`card_${sub.id}`;

      const chHTML=chs.map(c=>{
        const isDone=!!completions[`${ex.id}|${sub.id}|${c}`];
        return `<div class="chap-item${isDone?' done':''}" data-ex="${ex.id}" data-sub="${sub.id}" data-ch="${encodeURIComponent(c)}">
          <div class="chk">${isDone?'✓':''}</div>
          <div class="chap-name">${c}</div>
          <button class="chap-del" onclick="deleteChapter(event,'${ex.id}','${sub.id}','${encodeURIComponent(c)}')" title="Delete">✕</button>
        </div>`;
      }).join('');

      card.innerHTML=`
        <div class="subj-top">
          <div class="subj-name" onclick="toggleCard('${sub.id}')">${sub.name}</div>
          <div class="subj-pct" style="color:${ex.color}">${spct}%</div>
        </div>
        <div class="prog"><div class="prog-f" id="pf_${sub.id}" style="width:${spct}%;background:${ex.color}"></div></div>
        <div class="subj-meta">
          <span id="sm_${sub.id}">${sdone}/${chs.length} done</span>
          <div style="display:flex;gap:0.4rem">
            <button class="tiny-btn" onclick="openModal('chap','${ex.id}','${sub.id}')">＋ Ch</button>
            <button class="tiny-btn" onclick="openModal('sub-rename','${ex.id}','${sub.id}')">✏️</button>
            <button class="tiny-btn del" onclick="deleteSubject('${ex.id}','${sub.id}')">✕</button>
          </div>
        </div>
        <div class="chap-panel" id="cp_${sub.id}">
          ${chHTML}
          <div class="add-chap-row">
            <input class="mini-input" id="newch_${sub.id}" placeholder="New chapter name…" onkeydown="if(event.key==='Enter')addChapInline('${ex.id}','${sub.id}')">
            <button class="mini-add" onclick="addChapInline('${ex.id}','${sub.id}')">＋</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    const addBtn=document.createElement('button');
    addBtn.className='add-subj-btn';
    addBtn.textContent='＋ Add Subject';
    addBtn.onclick=()=>openModal('subject',ex.id);
    grid.appendChild(addBtn);

    grid.addEventListener('click',function(e){
      const ci=e.target.closest('.chap-item');
      if(!ci||e.target.closest('.chap-del')) return;
      const exId=ci.dataset.ex,subId=ci.dataset.sub,ch=decodeURIComponent(ci.dataset.ch);
      const key=`${exId}|${subId}|${ch}`;
      completions[key]=!completions[key];
      saveCompletions();
      ci.classList.toggle('done',!!completions[key]);
      ci.querySelector('.chk').textContent=completions[key]?'✓':'';
      refreshSubjectCard(exId,subId);
      renderKPI();
    });
  });
}

function toggleCard(subId){ document.getElementById(`card_${subId}`)?.classList.toggle('open'); }

function refreshSubjectCard(exId,subId){
  const ex=state.exams.find(e=>e.id===exId);
  const sub=ex?.subjects.find(s=>s.id===subId);
  if(!sub) return;
  const chs=sub.chapters;
  const done=chs.filter(c=>completions[`${exId}|${subId}|${c}`]).length;
  const pct=chs.length?Math.round(done/chs.length*100):0;
  const pf=document.getElementById(`pf_${subId}`);
  const sm=document.getElementById(`sm_${subId}`);
  const card=document.getElementById(`card_${subId}`);
  if(pf) pf.style.width=pct+'%';
  if(sm) sm.textContent=`${done}/${chs.length} done`;
  if(card) card.querySelector('.subj-pct').textContent=pct+'%';
}

function addChapInline(exId,subId){
  const inp=document.getElementById(`newch_${subId}`);
  const val=inp.value.trim();
  if(!val) return;
  const ex=state.exams.find(e=>e.id===exId);
  const sub=ex?.subjects.find(s=>s.id===subId);
  if(!sub) return;
  sub.chapters.push(val);
  saveState();
  inp.value='';
  const panel=document.getElementById(`cp_${subId}`);
  if(panel){
    const newItem=document.createElement('div');
    newItem.className='chap-item';
    newItem.dataset.ex=exId; newItem.dataset.sub=subId; newItem.dataset.ch=encodeURIComponent(val);
    newItem.innerHTML=`<div class="chk"></div><div class="chap-name">${val}</div><button class="chap-del" onclick="deleteChapter(event,'${exId}','${subId}','${encodeURIComponent(val)}')" title="Delete">✕</button>`;
    panel.insertBefore(newItem,panel.querySelector('.add-chap-row'));
  }
  refreshSubjectCard(exId,subId);
  renderDropdowns();
  toast('✅ Chapter added',val);
}

function deleteChapter(e,exId,subId,chEnc){
  e.stopPropagation();
  const ch=decodeURIComponent(chEnc);
  if(!confirm(`Delete chapter "${ch}"?`)) return;
  const ex=state.exams.find(e=>e.id===exId);
  const sub=ex?.subjects.find(s=>s.id===subId);
  if(!sub) return;
  sub.chapters=sub.chapters.filter(c=>c!==ch);
  delete completions[`${exId}|${subId}|${ch}`];
  saveState(); saveCompletions(); render();
}

function deleteSubject(exId,subId){
  const ex=state.exams.find(e=>e.id===exId);
  const sub=ex?.subjects.find(s=>s.id===subId);
  if(!confirm(`Delete subject "${sub?.name}" and all its chapters?`)) return;
  ex.subjects=ex.subjects.filter(s=>s.id!==subId);
  saveState(); render();
}

function deleteExam(exId){
  const ex=state.exams.find(e=>e.id===exId);
  if(!confirm(`Delete exam "${ex?.name}" and ALL its subjects?`)) return;
  state.exams=state.exams.filter(e=>e.id!==exId);
  saveState(); render();
}

// ==================== LOG ====================
function renderLog(){
  const el=document.getElementById('logList');
  if(!sessions.length){
    el.innerHTML='<div class="log-empty"><div class="em">🎯</div>No sessions yet — start studying!</div>';
    return;
  }
  el.innerHTML=sessions.slice(0,25).map(s=>{
    const ex=state.exams.find(e=>e.id===s.exId);
    const color=ex?.color||'#7c6dfa';
    return `<div class="log-item">
      <div class="log-dot" style="background:${color}"></div>
      <div>
        <div class="log-sub">${s.sub||s.exName||'—'}</div>
        <div class="log-ch">${s.ch} · ${s.phLabel}</div>
        <div class="log-dt">${s.date}</div>
      </div>
      <div class="log-dur">${s.dur}m</div>
    </div>`;
  }).join('');
}

// ==================== MODAL ====================
function openModal(mode, a='', b=''){
  modalMode=mode; modalData={a,b}; selColor=PALETTE[0];
  const overlay=document.getElementById('overlay');
  const title=document.getElementById('modalTitle');
  const body=document.getElementById('modalBody');
  const confirm=document.getElementById('modalConfirm');

  if(mode==='exam'){
    title.textContent='Add New Exam';
    confirm.textContent='Add Exam';
    body.innerHTML=`
      <div class="color-label">Choose color</div>
      <div class="color-picker">${PALETTE.map((c,i)=>`<div class="color-swatch${i===0?' sel':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}</div>
      <input class="modal-input" id="mIn" placeholder="Exam name (e.g. CFA Level 1)" autofocus>
    `;
    confirm.onclick=()=>{
      const v=document.getElementById('mIn').value.trim();
      if(!v) return;
      state.exams.push({id:genId(),name:v,color:selColor,subjects:[]});
      saveState(); closeModal(); render(); toast('✅ Exam added',v);
    };
  } else if(mode==='exam-rename'){
    const ex=state.exams.find(e=>e.id===a);
    title.textContent='Rename Exam';
    confirm.textContent='Save';
    body.innerHTML=`<input class="modal-input" id="mIn" value="${ex?.name||''}" autofocus>
      <div class="color-label">Change color</div>
      <div class="color-picker">${PALETTE.map((c,i)=>`<div class="color-swatch${c===(ex?.color||PALETTE[0])?' sel':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}</div>`;
    selColor=ex?.color||PALETTE[0];
    confirm.onclick=()=>{
      const v=document.getElementById('mIn').value.trim();
      if(!v) return;
      if(ex){ ex.name=v; ex.color=selColor; }
      saveState(); closeModal(); render(); toast('✅ Renamed',v);
    };
  } else if(mode==='subject'){
    title.textContent='Add Subject';
    confirm.textContent='Add Subject';
    body.innerHTML=`<input class="modal-input" id="mIn" placeholder="Subject name…" autofocus>`;
    confirm.onclick=()=>{
      const v=document.getElementById('mIn').value.trim();
      if(!v) return;
      const ex=state.exams.find(e=>e.id===a);
      if(ex) ex.subjects.push({id:genId(),name:v,chapters:[]});
      saveState(); closeModal(); render(); toast('✅ Subject added',v);
    };
  } else if(mode==='sub-rename'){
    const ex=state.exams.find(e=>e.id===a);
    const sub=ex?.subjects.find(s=>s.id===b);
    title.textContent='Rename Subject';
    confirm.textContent='Save';
    body.innerHTML=`<input class="modal-input" id="mIn" value="${sub?.name||''}" autofocus>`;
    confirm.onclick=()=>{
      const v=document.getElementById('mIn').value.trim();
      if(!v) return;
      if(sub) sub.name=v;
      saveState(); closeModal(); render(); toast('✅ Renamed',v);
    };
  } else if(mode==='chap'){
    title.textContent='Add Chapter';
    confirm.textContent='Add Chapter';
    body.innerHTML=`<input class="modal-input" id="mIn" placeholder="Chapter name…" autofocus>`;
    confirm.onclick=()=>{
      const v=document.getElementById('mIn').value.trim();
      if(!v) return;
      const ex=state.exams.find(e=>e.id===a);
      const sub=ex?.subjects.find(s=>s.id===b);
      if(sub) sub.chapters.push(v);
      saveState(); closeModal(); render(); toast('✅ Chapter added',v);
    };
  }

  overlay.classList.add('show');
  setTimeout(()=>document.getElementById('mIn')?.focus(),100);
  setTimeout(()=>{
    const inp=document.getElementById('mIn');
    if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') document.getElementById('modalConfirm').click(); };
  },110);
}

function pickColor(el,c){
  selColor=c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
}

function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
function closeModalOutside(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

// ==================== EDIT NAME ====================
function editName(){
  const cur=state.userName;
  const v=prompt('Enter your name:',cur);
  if(v&&v.trim()){
    state.userName=v.trim();
    saveState(); renderHeader();
    toast('✅ Name updated',v.trim());
  }
}

// ==================== TIMER ====================
function startTimer(){
  selExamId=document.getElementById('seExam').value;
  selSubId=document.getElementById('seSub').value;
  selChapName=document.getElementById('seCh').value;
  if(!selChapName){ toast('⚠️ Select Chapter','Choose Exam → Subject → Chapter first!'); return; }
  if(tRunning) return;
  tRunning=true;
  document.getElementById('startBtn').disabled=true;

  tId=setInterval(()=>{
    tVal--;
    updateTimerUI();
    syncPip();

    if(tVal<=0){
      clearInterval(tId); tId=null; tRunning=false;
      document.getElementById('startBtn').disabled=false;
      logSession();

      // ---- NOTIFICATION ----
      const finishedPhase = PHASES[phIdx];
      const nextPhaseIdx = (phIdx+1) < PHASES.length ? phIdx+1 : null;
      const isWork = finishedPhase[2]==='w';

      if(nextPhaseIdx !== null){
        const nextIsBreak = PHASES[nextPhaseIdx][2]==='b';
        const nextDur = PHASES[nextPhaseIdx][0]/60;
        if(isWork){
          sendNotif(
            '✅ Work Session Done!',
            `${finishedPhase[1]} complete. Time for a ${nextDur}-min break! Starting automatically…`,
            '☕'
          );
        } else {
          sendNotif(
            '📖 Break Over — Back to Work!',
            `Break done. ${PHASES[nextPhaseIdx][1]} starting now. Stay focused!`,
            '🔥'
          );
        }
      } else {
        sendNotif('🎉 Full Cycle Complete!','All 3 work sessions + breaks done! Incredible session!','🏆');
      }
      // ----------------------

      phIdx++;
      if(phIdx>=PHASES.length){
        phIdx=0; tVal=PHASES[0][0]; tTotal=PHASES[0][0];
        updateTimerUI(); updatePhaseDots();
        toast('🎉 Cycle Complete!','Full 50-10-50-10-50-20 done! Well done!');
      } else {
        tVal=PHASES[phIdx][0]; tTotal=PHASES[phIdx][0];
        updateTimerUI(); updatePhaseDots();
        const isB=PHASES[phIdx][2]==='b';
        toast(isB?'☕ Break Time':'📖 Study Time', PHASES[phIdx][1]);
        setTimeout(startTimer,1800);
      }
    }
  },1000);
  updatePhaseDots();
}

function pauseTimer(){
  if(tId){ clearInterval(tId); tId=null; tRunning=false; document.getElementById('startBtn').disabled=false; }
  // also update pip pause btn if pip is open
  syncPip();
}

function resetTimer(){
  pauseTimer();
  phIdx=0; tVal=PHASES[0][0]; tTotal=PHASES[0][0];
  updateTimerUI(); updatePhaseDots();
}

function updateTimerUI(){
  const m=Math.floor(tVal/60),s=tVal%60;
  const str=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('tNum').textContent=str;
  document.getElementById('tPhase').textContent=PHASES[phIdx][1];
  document.title=`${str} — Study Tracker`;
  const pct=tVal/tTotal;
  const offset=CIRC*(1-pct);
  const ring=document.getElementById('ringF');
  ring.style.strokeDashoffset=offset;
  ring.className='r-fill'+(PHASES[phIdx][2]==='b'?' brk':'');
  syncPip();
}

function updatePhaseDots(){
  for(let i=0;i<6;i++){
    const d=document.getElementById('pd'+i);
    d.classList.remove('on','done');
    if(i<phIdx) d.classList.add('done');
    else if(i===phIdx) d.classList.add('on');
  }
}

function logSession(){
  const ex=state.exams.find(e=>e.id===selExamId);
  const sub=ex?.subjects.find(s=>s.id===selSubId);
  sessions.unshift({
    date:new Date().toLocaleDateString('en-IN'),
    ts:Date.now(),
    exId:selExamId, exName:ex?.name||'',
    sub:sub?.name||'', ch:selChapName,
    dur:(tTotal/60).toFixed(0),
    pt:PHASES[phIdx][2], phLabel:PHASES[phIdx][1]
  });
  saveSessions(); renderLog(); renderKPI();
}

// ==================== PiP (Document PiP + inline fallback) ====================
async function togglePip(){
  // If Document PiP is supported, use it for true floating window
  if(HAS_DOC_PIP){
    if(docPipWindow && !docPipWindow.closed){
      await docPipWindow.close();
      docPipWindow = null;
      document.getElementById('pipBtn').classList.remove('active');
      document.getElementById('pipBtn').textContent='🖼 PiP';
      return;
    }
    try{
      docPipWindow = await window.documentPictureInPicture.requestWindow({
        width: 240,
        height: 260,
        disallowReturnToOpener: false
      });

      // Style the pip window
      const pipDoc = docPipWindow.document;
      pipDoc.head.innerHTML=`
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
        <style>
          *{margin:0;padding:0;box-sizing:border-box;}
          body{
            font-family:'Outfit',sans-serif;
            background:#0a0a10;color:#ebebf5;
            height:100vh;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:0.5rem;padding:1rem;
          }
          .label{font-size:0.58rem;color:#6a6a88;text-transform:uppercase;letter-spacing:1px;}
          .time{
            font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:700;
            color:#7c6dfa;line-height:1;
          }
          .time.brk{color:#22d9a0;}
          .phase{font-size:0.7rem;color:#9898b8;letter-spacing:0.5px;margin-top:2px;}
          .subinfo{font-size:0.65rem;color:#6a6a88;text-align:center;max-width:190px;line-height:1.4;margin-top:2px;}
          .dot-row{display:flex;gap:4px;margin-top:6px;}
          .dot{width:24px;height:4px;border-radius:2px;background:#222230;}
          .dot.work.on{background:#7c6dfa;}
          .dot.brk.on{background:#22d9a0;}
          .dot.done{background:#222230;opacity:0.3;}
          .pause-btn{
            margin-top:8px;width:100%;padding:0.5rem;
            background:rgba(245,95,87,0.12);border:1px solid rgba(245,95,87,0.3);
            border-radius:8px;color:#f55f57;font-size:0.75rem;font-weight:700;
            cursor:pointer;font-family:inherit;transition:filter 0.15s;
          }
          .pause-btn:hover{filter:brightness(1.2);}
          .divider{width:100%;height:1px;background:#1c1c2a;margin:2px 0;}
        </style>
      `;

      pipDoc.body.innerHTML=`
        <div class="label">📚 Study Tracker</div>
        <div class="time" id="pipTime">50:00</div>
        <div class="phase" id="pipPhase">Work #1</div>
        <div class="divider"></div>
        <div class="subinfo" id="pipSub">—</div>
        <div class="dot-row" id="pipDots"></div>
        <button class="pause-btn" id="pipPause">⏸ Pause</button>
      `;

      // Wire up pause button
      pipDoc.getElementById('pipPause').addEventListener('click',()=>{
        pauseTimer();
        pipDoc.getElementById('pipPause').textContent = tRunning ? '⏸ Pause' : '▶ Resume';
      });

      // Handle pip window being closed by user
      docPipWindow.addEventListener('pagehide',()=>{
        docPipWindow=null;
        document.getElementById('pipBtn').classList.remove('active');
        document.getElementById('pipBtn').textContent='🖼 PiP';
      });

      document.getElementById('pipBtn').classList.add('active');
      document.getElementById('pipBtn').textContent='🖼 PiP ✓';
      syncPip();
      toast('🖼 Floating PiP','Timer is now floating — switch apps freely!');

    } catch(err){
      console.warn('Document PiP failed, falling back to inline:',err);
      // fallback to inline
      togglePipInline();
    }
  } else {
    // Fallback: inline pip
    togglePipInline();
  }
}

function togglePipInline(){
  pipInline=!pipInline;
  document.getElementById('pipEl').classList.toggle('show',pipInline);
  document.getElementById('pipBtn').classList.toggle('active',pipInline);
  if(pipInline){
    toast('🖼 Inline PiP','Document PiP requires Chrome 116+. Using overlay instead.');
    syncPip();
  }
}

function syncPip(){
  const m=Math.floor(tVal/60),s=tVal%60;
  const str=`${m}:${s.toString().padStart(2,'0')}`;
  const isBreak = PHASES[phIdx][2]==='b';

  // Inline PiP
  document.getElementById('pipT').textContent=str;
  document.getElementById('pipPh').textContent=PHASES[phIdx][1];
  const ex=state.exams.find(e=>e.id===selExamId);
  const subLabel=selChapName?`${ex?.name||''} › ${selChapName}`:'—';
  document.getElementById('pipSub').textContent=subLabel;

  // Document PiP
  if(docPipWindow && !docPipWindow.closed){
    const pd=docPipWindow.document;
    const timeEl=pd.getElementById('pipTime');
    const phEl=pd.getElementById('pipPhase');
    const subEl=pd.getElementById('pipSub');
    const dotsEl=pd.getElementById('pipDots');
    const pauseEl=pd.getElementById('pipPause');

    if(timeEl){ timeEl.textContent=str; timeEl.className=isBreak?'time brk':'time'; }
    if(phEl) phEl.textContent=PHASES[phIdx][1];
    if(subEl) subEl.textContent=subLabel;
    if(pauseEl) pauseEl.textContent=tRunning?'⏸ Pause':'▶ Resume';

    // Render phase dots
    if(dotsEl){
      dotsEl.innerHTML=PHASES.map((ph,i)=>{
        let cls='dot '+(ph[2]==='w'?'work':'brk');
        if(i<phIdx) cls+=' done';
        else if(i===phIdx) cls+=' on';
        return `<div class="${cls}"></div>`;
      }).join('');
    }
  }
}

// ==================== TOAST ====================
let toastTm;
function toast(title,body){
  document.getElementById('toastT').textContent=title;
  document.getElementById('toastB').textContent=body;
  const el=document.getElementById('toast');
  el.classList.add('on');
  clearTimeout(toastTm);
  toastTm=setTimeout(()=>el.classList.remove('on'),3500);
}

// ==================== CLEAR ====================
function clearAll(){
  if(!confirm('Delete ALL sessions and chapter progress? This cannot be undone.')) return;
  sessions=[]; completions={};
  saveSessions(); saveCompletions();
  render(); toast('🗑 Data cleared','Sessions and progress reset.');
}

// ==================== TODO ====================
let todos = loadTodos();
function loadTodos(){ try{return JSON.parse(localStorage.getItem('gk4_todos'))||[];}catch(e){return[];} }
function saveTodos(){ localStorage.setItem('gk4_todos',JSON.stringify(todos)); }

function addTodo(){
  const inp=document.getElementById('todoInp');
  const val=inp.value.trim();
  if(!val) return;
  todos.unshift({id:genId(),text:val,done:false,ts:Date.now()});
  saveTodos(); renderTodos();
  inp.value=''; inp.focus();
}

function toggleTodo(id){
  const t=todos.find(t=>t.id===id);
  if(t) t.done=!t.done;
  saveTodos(); renderTodos();
}

function deleteTodo(id){
  todos=todos.filter(t=>t.id!==id);
  saveTodos(); renderTodos();
}

function clearDoneTodos(){
  todos=todos.filter(t=>!t.done);
  saveTodos(); renderTodos();
}

function renderTodos(){
  const el=document.getElementById('todoList');
  const cnt=document.getElementById('todoCount');
  if(!todos.length){
    el.innerHTML='<div class="todo-empty">No tasks yet — add something above!</div>';
    cnt.textContent='0 tasks';
    return;
  }
  const sorted=[...todos.filter(t=>!t.done),...todos.filter(t=>t.done)];
  el.innerHTML=sorted.map(t=>`
    <div class="todo-item${t.done?' done-t':''}">
      <div class="todo-chk" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
      <div class="todo-txt" onclick="toggleTodo('${t.id}')">${t.text}</div>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>`).join('');
  const remaining=todos.filter(t=>!t.done).length;
  cnt.textContent=`${remaining} remaining · ${todos.length} total`;
}

// ==================== BOOT ====================
render();
renderTodos();
updateTimerUI();
updatePhaseDots();
</script>
